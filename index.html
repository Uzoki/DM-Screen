<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DM Screen — Initiative Tracker</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="app">
    <header class="app-header">
      <h1>DM Screen</h1>
      <div class="round-control">
        <button id="roundDown" class="round-btn" type="button" aria-label="Decrease round">−</button>
        <div class="round-badge">
          <span class="round-label">Round</span>
          <span id="roundNumber">1</span>
        </div>
        <button id="roundUp" class="round-btn" type="button" aria-label="Increase round">+</button>
      </div>
    </header>

    <div class="columns-wrap">

      <div class="column column-initiative">
        <section class="add-panel">
          <h2>Add a combatant</h2>
          <form id="addForm" class="add-form">
            <input type="text" id="nameInput" placeholder="Name" required />
            <input type="number" id="iniInput" placeholder="Initiative" required />
            <button type="submit" class="btn-primary">Add</button>
          </form>
        </section>

        <section class="dump-panel">
          <h2>Paste a List</h2>
          <div class="dump-area">
            <textarea id="dumpInput" rows="4"></textarea>
            <div class="dump-controls">
              <button id="parseBtn" class="btn-secondary" type="button">Parse &amp; add</button>
            </div>
          </div>
        </section>

        <section class="tracker-panel">
          <h2>Turn order</h2>
          <ol id="trackerList" class="tracker-list"></ol>
        </section>

        <section class="controls-panel">
          <button id="swapBtn" class="btn-primary hidden" type="button">Swap</button>
          <button id="copyBtn" class="btn-secondary">Copy list</button>
          <button id="clearBtn" class="btn-danger">Clear all</button>
        </section>
      </div>

      <div class="column column-dice">
        <section class="dice-panel">
          <h2>Dice</h2>

          <div class="dice-count-row">
            <div class="dice-count-control">
              <button id="diceCountDown" class="round-btn" type="button" aria-label="Decrease dice count">−</button>
              <input type="number" id="diceCountInput" class="dice-count-input" value="1" min="1" />
              <button id="diceCountUp" class="round-btn" type="button" aria-label="Increase dice count">+</button>
            </div>
            <input type="number" id="modifierInput" class="modifier-input" placeholder="Modifier" />
          </div>

          <div class="die-buttons">
            <button class="die-btn" data-sides="4" type="button">d4</button>
            <button class="die-btn" data-sides="6" type="button">d6</button>
            <button class="die-btn" data-sides="8" type="button">d8</button>
            <button class="die-btn" data-sides="10" type="button">d10</button>
            <button class="die-btn" data-sides="12" type="button">d12</button>
            <button class="die-btn" data-sides="20" type="button">d20</button>
            <button class="die-btn" data-sides="100" type="button">d100</button>
          </div>

          <div id="diceResult" class="dice-result"></div>

          <div class="panel-footer">
            <button id="diceClearBtn" class="btn-secondary" type="button">Clear</button>
          </div>
        </section>

        <section class="mob-panel">
          <h2>Mob Attack Calculator</h2>

          <div class="mob-inputs">
            <input type="number" id="mobAttacksInput" placeholder="Attacks" min="1" />
            <input type="number" id="mobBonusInput" placeholder="Atk bonus" />
            <input type="number" id="mobACInput" placeholder="Target AC" />
          </div>

          <div class="mob-adv-row">
            <label class="mob-check"><input type="checkbox" id="mobAdvCheck" /> Advantage</label>
            <label class="mob-check"><input type="checkbox" id="mobDisCheck" /> Disadvantage</label>
          </div>

          <div id="mobAutoResult" class="mob-auto-result"></div>

          <div class="panel-footer">
            <button id="mobRollBtn" class="btn-primary" type="button">Roll attacks</button>
            <button id="mobClearBtn" class="btn-secondary" type="button">Clear</button>
          </div>

          <div id="mobRollResult" class="dice-result"></div>
        </section>
      </div>

      <div class="column column-lookup">
        <section class="lookup-panel">
          <h2>Lookup</h2>
        </section>
      </div>

    </div>
  </div>

  <p id="toast" class="toast hidden"></p>

  <div id="modalOverlay" class="modal-overlay hidden">
    <div class="modal-box">
      <p id="modalMessage"></p>
      <div id="modalButtons" class="modal-buttons"></div>
    </div>
  </div>

  <script src="dm-screen.js"></script>
</body>

</html>
